<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Hope Oyadiran Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="site-container">
        <header class="sticky-header">
            <div class="logo-area">
                <div class="logo-placeholder">H</div>
                <h1 class="logo">My Portfolio</h1>
            </div>
            <nav>
                <button class="hamburger" id="hamburger-btn" aria-label="Toggle Menu" aria-expanded="false">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <ul class="nav-links" id="nav-links">
                    <li><a href="index.html" class="nav-item">Home</a></li>
                    <li><a href="about.html" class="nav-item">About Me</a></li>
                    <li><a href="projects.html" class="nav-item">Projects</a></li>
                    <li><a href="planner.html" class="nav-item">Academic Planner</a></li>
                    <li><a href="contact.html" class="nav-item active">Contact</a></li>
                </ul>
            </nav>
        </header>

        <main class="page-section centered-page-content">
            <div class="contact-center-wrapper">
                <h2 class="text-center">Connect With Me</h2>
                <p class="text-center contact-sub-intro">fill out the form below to reach me regarding collaborations and academic projects</p>
                
                <div class="contact-container">
                    <form id="contact-form" novalidate>
                        <div id="form-error-msg" class="alert-message error-box hidden"></div>
                        <div id="form-success-msg" class="alert-message success-box hidden">Message sent successfully!</div>

                        <div class="form-group">
                            <label for="fullName">Full Name</label>
                            <input type="text" id="fullName" placeholder="Your Name">
                        </div>

                        <div class="form-group">
                            <label for="emailAddress">Email Address</label>
                            <input type="email" id="emailAddress" placeholder="example@domain.com">
                        </div>

                        <div class="form-group">
                            <label for="phoneNumber">Phone Number</label>
                            <input type="tel" id="phoneNumber" placeholder="e.g. 08012345678">
                        </div>

                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" rows="5" placeholder="write your message here..."></textarea>
                        </div>

                        <button type="submit" class="btn-primary block-btn">Submit Form</button>
                    </form>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Oyadiran Hope | MIVA Open University (COS 106). All Rights Reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
