<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner | Hope Oyadiran Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="site-container">
        <header class="sticky-header">
            <div class="logo-area">
                <div class="logo-placeholder">H</div>
                <h1 class="logo">My Portfolio</h1>
            </div>
            <nav>
                <button class="hamburger" id="hamburger-btn" aria-label="Toggle Menu" aria-expanded="false">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <ul class="nav-links" id="nav-links">
                    <li><a href="index.html" class="nav-item">Home</a></li>
                    <li><a href="about.html" class="nav-item">About Me</a></li>
                    <li><a href="projects.html" class="nav-item">Projects</a></li>
                    <li><a href="planner.html" class="nav-item active">Academic Planner</a></li>
                    <li><a href="contact.html" class="nav-item">Contact</a></li>
                </ul>
            </nav>
        </header>

        <main class="page-section">
            <h2 class="text-center">Academic Planner</h2>
            <p class="text-center" style="color: var(--text-muted); margin-bottom: 20px;">Manage system defense tasks, class deliverables, and labs efficiently.</p>
            
            <div class="planner-box">
                <form id="todo-form" class="todo-input-row">
                    <input type="text" id="todo-input" placeholder="Add an assignment or study task..." required>
                    <button type="submit" class="btn-primary">Add Task</button>
                </form>
                
                <table class="planner-table">
                    <thead>
                        <tr>
                            <th>Status</th>
                            <th>Cybersecurity/Academic Task</th>
                            <th style="text-align: right;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="todo-list">
                        <!-- Tasks dynamically handled by script.js -->
                    </tbody>
                </table>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Oyadiran Hope | MIVA Open University (COS 106). All Rights Reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
